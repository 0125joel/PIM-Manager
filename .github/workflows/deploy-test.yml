name: Deploy to Azure (Dev Test)

on:
  push:
    branches: [dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Set version environment variables
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_DATE=$(node -p "require('./package.json').releaseDate")
          echo "NEXT_PUBLIC_APP_VERSION=v${VERSION}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_RELEASE_DATE=${RELEASE_DATE}" >> $GITHUB_ENV

      - name: Build
        run: npm run build
        # NEXT_PUBLIC_CLIENT_ID is intentionally not set here.
        # Client ID is injected at deploy time via env-config.js below.

      - name: Inject Client ID into runtime config
        run: |
          printf 'window.__PIM_CONFIG__ = { clientId: "%s" };' "${{ secrets.ENTRA_CLIENT_ID }}" > out/env-config.js

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "out"
          skip_app_build: true
          config_file_location: "public"
